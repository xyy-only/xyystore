user  root;
worker_processes  2;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 12m;

    # HTTP -> HTTPS 重定向
    server {
        listen       80;
        server_name  _;
        return 301 https://$host$request_uri;
    }

    # HTTPS 服务
    server {
        listen       443 ssl;
        server_name  _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        index index.html index.htm;
        root /app/front;

        autoindex off;

        location / {
            root /app/front;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 禁用静态资源缓存（确保更新后浏览器加载最新文件）
        location ~* \.(js|css|html)$ {
            root /app/front;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }

        # FastDFS 文件下载
        location ~/group([0-9])/M([0-9])([0-9]) {
            ngx_fastdfs_module;
        }

        # FastCGI 路由 - 指向 FastCGI 应用容器 (172.30.0.4)
        location /api/login {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $http_origin;
                add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
                add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Token';
                add_header Access-Control-Allow-Credentials true;
                add_header Access-Control-Max-Age 3600;
                return 204;
            }
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods '*' always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Token' always;
            fastcgi_pass 172.30.0.4:10000;
            include fastcgi.conf;
        }

        location /api/reg {
