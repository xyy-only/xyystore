# connect timeout in seconds
connect_timeout=2
# network timeout in seconds
network_timeout=30
# the base path to store log files
base_path=/fastdfs_data_and_log
# if load FastDFS parameters from tracker server
load_fdfs_parameters_from_tracker=false
# storage sync file max delay seconds
storage_sync_file_max_delay = 86400
# if the url / uri including the group name
url_have_group_name = true
# tracker_server
tracker_server=172.30.0.3:22122
# the port of the local storage server
storage_server_port=23000
# the group name of the local storage server
group_name=group1
# store_path count
store_path_count=1
# store_path#
store_path0=/fastdfs_data_and_log/storage
# standard log level
log_level=info
# set the log filename, such as /usr/local/apache2/logs/mod_fastdfs.log
log_filename=
# response mode when the file not exist in the local file system
# proxy: forward the request to the storage server where the file exists
# redirect: return the redirect response (HTTP status code 302)
response_mode=proxy
# if the anti-steal token check fail, return the content of this url
anti_steal_token=false
# the token check fail buff size
token_check_fail_buff_size = 256
# the token check fail content type
token_check_fail_content_type = text/html
# if support flv
# default value is true
flv_support = true
# flv file extension
flv_extension = flv
# set the group count
# set to non-zero to support multi-group on this storage server
# set to 0 for single group mode
# groups settings section base 0
# if group count <= 0, file URL format is:
#   http://host:port/bindaddr/filename
# else file URL format is:
#   http://host:port/bindaddr/group_name/filename
# 引入 HTTP 配置 (包含 mime_types, default_content_type, anti_steal 等)
#include /etc/fdfs/http.conf

group_count = 0
